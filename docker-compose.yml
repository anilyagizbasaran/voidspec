version: '3.8'

services:
  backend:
    build: ./backend
    container_name: serverpanel-backend
    restart: unless-stopped
    pid: host
    privileged: true
    env_file:
      - ./backend/.env
    environment:
      - ALLOWED_ORIGIN=http://localhost
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root:/root
    ports:
      - "3001:3001"

  frontend:
    build: ./frontend
    container_name: serverpanel-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
